<!DOCTYPE html>
<head>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наші товари — ВусоЛапоХвіст</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background: #ff9800; color: white; padding: 1rem; text-align: center; }
        nav { background: #333; color: white; padding: 0.5rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .price { color: #ff9800; font-weight: bold; font-size: 1.2rem; }
        button { background: #ff9800; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #e68a00; }
    </style>
</head>
<body>

<header>
    <h1>Наші Товари</h1>
</header>

<nav>
    <a href="index.html">Головна</a>
    <a href="shop.html">Магазин</a>
</nav>

<div class="container">
    <div class="products">
        <div class="card">
            <img src="korm.png" alt="Корм">
            <h3>Корм для котів (Преміум)</h3>
            <p>Збалансоване харчування для дорослих котів.</p>
            <p class="price">250 грн</p>
            <button>Купити</button>
        </div>

        <div class="card">
            <img src="balls.jpg" alt="Іграшка">
            <h3>М'ячик для собак</h3>
            <p>Надміцний гумовий м'ячик для активних ігор.</p>
            <p class="price">120 грн</p>
            <button>Купити</button>
        </div>

        <div class="card">
            <img src="cat1.jpg" alt="Лежанка">
            <h3>М'яка лежанка</h3>
            <p>Найзатишніше місце для сну вашого улюбленця.</p>
            <p class="price">650 грн</p>
            <button>Купити</button>
        </div>
    </div>
</div>

</body>
</html>
